<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F4F3EF;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .logo {
    display: inline-flex;
    align-items: center;
  }

  .text {
    font-family: 'DM Sans', sans-serif;
    font-size: 46px;
    font-weight: 700;
    color: #0D1B2A;
    letter-spacing: -2px;
    line-height: 1;
  }

  .text.light {
    font-weight: 300;
  }
</style>
</head>
<body>
  <div class="logo">
    <span class="text light">Get</span>
    <span class="text">Sol</span>

    <svg width="36" height="52" viewBox="0 0 36 52" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin: 0 1px -2px;">
      <ellipse cx="18" cy="31" rx="15" ry="16.5" stroke="#0D1B2A" stroke-width="3.2" fill="none"/>
      <polyline points="10,31 16,38.5 27,21" stroke="#14C99A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <span class="text">Desk</span>
  </div>
</body>
</html>
